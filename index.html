  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  // Scoped to the unpacking try block only (removed in finally below) — a
  // window-level capture listener left attached indefinitely also catches
  // unrelated later page/extension errors (e.g. wallet SES lockdown, browser
  // tracking-prevention warnings), which would misreport as bundle failures.
  function onBundlerError(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }
  window.addEventListener('error', onBundlerError, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  } finally {
    window.removeEventListener('error', onBundlerError, true);
  }
});

ay:0.24s; margin:0; max-width:1180px; font-size:38px; line-height:1.4; color:rgba(244,238,225,0.86); font-weight:300;\">A drop-in set of principles, enforceable rules, repeatable skills, verification agents and mechanical hooks for <strong style=\"font-weight:600; color:#F4EEE1;\">Rust (Tauri&nbsp;2) + React + TypeScript<\u002Fstrong> desktop apps.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"fade\" style=\"animation-delay:0.4s; display:flex; gap:44px; font-family:'JetBrains Mono',monospace; font-size:23px; letter-spacing:0.06em; color:rgba(244,238,225,0.72);\">\n      <span style=\"color:#E4572E;\">●<\u002Fspan> Rust <span style=\"color:#E4572E;\">●<\u002Fspan> Tauri&nbsp;2 <span style=\"color:#E4572E;\">●<\u002Fspan> React <span style=\"color:#E4572E;\">●<\u002Fspan> TypeScript\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"The Thesis\" data-screen-label=\"Thesis\" data-speaker-notes=\"This is the whole philosophy in one line. Tests are what make a promise real; everything else is guarded only by goodwill, which drifts.\" style=\"box-sizing:border-box; background:#F4EEE1; color:#171310; padding:92px 120px; font-family:'Spline Sans',sans-serif; display:flex; flex-direction:column;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; font-family:'JetBrains Mono',monospace; font-size:22px; letter-spacing:0.14em; text-transform:uppercase; color:#8A8171; border-bottom:1px solid rgba(23,19,16,0.14); padding-bottom:22px;\">\n      <span>The one-sentence version<\u002Fspan><span>02 / 08<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1; display:flex; flex-direction:column; justify-content:center; position:relative;\">\n      <div class=\"fade\" style=\"font-family:'Libre Caslon Display',serif; font-size:300px; line-height:0.6; color:#E4572E; height:120px; margin-bottom:10px;\">“<\u002Fdiv>\n      <h2 class=\"rise\" style=\"margin:0; max-width:1500px; font-family:'Libre Caslon Display',serif; font-weight:400; font-size:98px; line-height:1.08; letter-spacing:-0.01em;\">Every promise gets a test — or an explicit <span style=\"color:#E4572E;\">“planned”<\u002Fspan> label.<\u002Fh2>\n      <p class=\"rise\" style=\"animation-delay:0.14s; margin:52px 0 0; max-width:1320px; font-size:40px; line-height:1.42; color:#4C463C; font-weight:300;\">A codebase's <strong style=\"font-weight:600; color:#171310;\">strong areas<\u002Fstrong> are exactly the promises guarded by tests. Its <strong style=\"font-weight:600; color:#171310;\">weak areas<\u002Fstrong> are exactly the promises guarded by goodwill.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Provenance\" data-screen-label=\"Provenance\" data-speaker-notes=\"These numbers matter: this isn't theory. It was extracted from a real shipping Tauri app, ~16k lines, 125 tests, three rounds of deep post-mortem. Every rule traces to something that actually happened.\" style=\"box-sizing:border-box; background:#F4EEE1; color:#171310; padding:92px 120px; font-family:'Spline Sans',sans-serif; display:flex; flex-direction:column;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; font-family:'JetBrains Mono',monospace; font-size:22px; letter-spacing:0.14em; text-transform:uppercase; color:#8A8171; border-bottom:1px solid rgba(23,19,16,0.14); padding-bottom:22px;\">\n      <span>Provenance<\u002Fspan><span>03 / 08<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1; display:flex; flex-direction:column; justify-content:center;\">\n      <h2 class=\"rise\" style=\"margin:0 0 20px; font-family:'Libre Caslon Display',serif; font-weight:400; font-size:84px; line-height:1.02; letter-spacing:-0.01em; max-width:1300px;\">Extracted from a real, shipping application.<\u002Fh2>\n      <p class=\"rise\" style=\"animation-delay:0.1s; margin:0 0 68px; max-width:1180px; font-size:36px; line-height:1.42; color:#4C463C; font-weight:300;\">Not invented in a vacuum. Distilled from one Tauri&nbsp;2 desktop app across three generations of post-mortem analysis.<\u002Fp>\n      <div style=\"display:grid; grid-template-columns:repeat(4,1fr);\">\n        <div class=\"rise\" style=\"animation-delay:0.16s; padding-right:36px; border-right:1px solid rgba(23,19,16,0.16);\">\n          <div style=\"font-family:'Libre Caslon Display',serif; font-size:132px; line-height:0.9; color:#E4572E;\">~16k<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:24px; letter-spacing:0.08em; text-transform:uppercase; color:#8A8171; margin-top:14px;\">Lines of code<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rise\" style=\"animation-delay:0.24s; padding:0 36px; border-right:1px solid rgba(23,19,16,0.16);\">\n          <div style=\"font-family:'Libre Caslon Display',serif; font-size:132px; line-height:0.9; color:#E4572E;\">84<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:24px; letter-spacing:0.08em; text-transform:uppercase; color:#8A8171; margin-top:14px;\">Rust tests<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rise\" style=\"animation-delay:0.32s; padding:0 36px; border-right:1px solid rgba(23,19,16,0.16);\">\n          <div style=\"font-family:'Libre Caslon Display',serif; font-size:132px; line-height:0.9; color:#E4572E;\">41<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:24px; letter-spacing:0.08em; text-transform:uppercase; color:#8A8171; margin-top:14px;\">Vitest tests<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rise\" style=\"animation-delay:0.4s; padding-left:36px;\">\n          <div style=\"font-family:'Libre Caslon Display',serif; font-size:132px; line-height:0.9; color:#E4572E;\">3×<\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:24px; letter-spacing:0.08em; text-transform:uppercase; color:#8A8171; margin-top:14px;\">Post-mortem passes<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Architecture\" data-screen-label=\"Architecture\" data-speaker-notes=\"The kit is six layers, loaded in order during an AI session: an always-on constitution, references pulled on demand, enforceable rules, trigger-driven skills, read-only verification agents, and a mechanical enforcement layer. v1.1's point: rules you ask an agent to follow and rules the system enforces are different layers — the kit ships both.\" style=\"box-sizing:border-box; background:#151009; color:#F4EEE1; padding:92px 120px; font-family:'Spline Sans',sans-serif; display:flex; flex-direction:column;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; font-family:'JetBrains Mono',monospace; font-size:22px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(244,238,225,0.5); border-bottom:1px solid rgba(244,238,225,0.16); padding-bottom:22px;\">\n      <span>Architecture<\u002Fspan><span>04 / 08<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1; display:flex; flex-direction:column; justify-content:center;\">\n      <h2 class=\"rise\" style=\"margin:0 0 34px; font-family:'Libre Caslon Display',serif; font-weight:400; font-size:76px; line-height:1.0; letter-spacing:-0.01em;\">Six layers, <span style=\"color:#E4572E;\">one discipline.<\u002Fspan><\u002Fh2>\n      <div>\n        <div class=\"rise\" style=\"animation-delay:0.08s; display:grid; grid-template-columns:110px 1fr 340px; gap:40px; align-items:baseline; padding:17px 0; border-top:1px solid rgba(244,238,225,0.16);\">\n          <div style=\"font-family:'Libre Caslon Display',serif; font-size:50px; color:#E4572E; line-height:1;\">01<\u002Fdiv>\n          <div><div style=\"font-family:'Libre Caslon Display',serif; font-size:38px;\">Constitution<\u002Fdiv><div style=\"font-size:25px; color:rgba(244,238,225,0.6); font-weight:300; margin-top:4px;\">Always loaded. The short, project-specific core — invariants, routing, self-checks.<\u002Fdiv><\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:23px; color:rgba(244,238,225,0.8);\">CLAUDE.md<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rise\" style=\"animation-delay:0.14s; display:grid; grid-template-columns:110px 1fr 340px; gap:40px; align-items:baseline; padding:17px 0; border-top:1px solid rgba(244,238,225,0.16);\">\n          <div style=\"font-family:'Libre Caslon Display',serif; font-size:50px; color:#E4572E; line-height:1;\">02<\u002Fdiv>\n          <div><div style=\"font-family:'Libre Caslon Display',serif; font-size:38px;\">References<\u002Fdiv><div style=\"font-size:25px; color:rgba(244,238,225,0.6); font-weight:300; margin-top:4px;\">Loaded on demand. Principles, patterns, tokens, checklists, the design-craft guide.<\u002Fdiv><\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:23px; color:rgba(244,238,225,0.8);\">docs/ai/00–11<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rise\" style=\"animation-delay:0.2s; display:grid; grid-template-columns:110px 1fr 340px; gap:40px; align-items:baseline; padding:17px 0; border-top:1px solid rgba(244,238,225,0.16);\">\n          <div style=\"font-family:'Libre Caslon Display',serif; font-size:50px; color:#E4572E; line-height:1;\">03<\u002Fdiv>\n          <div><div style=\"font-family:'Libre Caslon Display',serif; font-size:38px;\">Rules<\u002Fdiv><div style=\"font-size:25px; color:rgba(244,238,225,0.6); font-weight:300; margin-top:4px;\">Enforceable per-domain constraints: ui · rust · tauri-permissions · testing.<\u002Fdiv><\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:23px; color:rgba(244,238,225,0.8);\">.claude/rules/<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rise\" style=\"animation-delay:0.26s; display:grid; grid-template-columns:110px 1fr 340px; gap:40px; align-items:baseline; padding:17px 0; border-top:1px solid rgba(244,238,225,0.16);\">\n          <div style=\"font-family:'Libre Caslon Display',serif; font-size:50px; color:#E4572E; line-height:1;\">04<\u002Fdiv>\n          <div><div style=\"font-family:'Libre Caslon Display',serif; font-size:38px;\">Skills<\u002Fdiv><div style=\"font-size:25px; color:rgba(244,238,225,0.6); font-weight:300; margin-top:4px;\">Seven trigger-driven procedures — feature-spec, design-exploration, blind-spot-audit…<\u002Fdiv><\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:23px; color:rgba(244,238,225,0.8);\">.claude/skills/ ×7<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rise\" style=\"animation-delay:0.32s; display:grid; grid-template-columns:110px 1fr 340px; gap:40px; align-items:baseline; padding:17px 0; border-top:1px solid rgba(244,238,225,0.16);\">\n          <div style=\"font-family:'Libre Caslon Display',serif; font-size:50px; color:#E4572E; line-height:1;\">05<\u002Fdiv>\n          <div><div style=\"font-family:'Libre Caslon Display',serif; font-size:38px;\">Agents<\u002Fdiv><div style=\"font-size:25px; color:rgba(244,238,225,0.6); font-weight:300; margin-top:4px;\">Read-only verifiers: adversarial-reviewer · permission-auditor · design-critic.<\u002Fdiv><\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:23px; color:rgba(244,238,225,0.8);\">.claude/agents/ ×3<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rise\" style=\"animation-delay:0.38s; display:grid; grid-template-columns:110px 1fr 340px; gap:40px; align-items:baseline; padding:17px 0; border-top:1px solid rgba(244,238,225,0.16); border-bottom:1px solid rgba(244,238,225,0.16);\">\n          <div style=\"font-family:'Libre Caslon Display',serif; font-size:50px; color:#E4572E; line-height:1;\">06<\u002Fdiv>\n          <div><div style=\"font-family:'Libre Caslon Display',serif; font-size:38px;\">Enforcement<\u002Fdiv><div style=\"font-size:25px; color:rgba(244,238,225,0.6); font-weight:300; margin-top:4px;\">Mechanical guards for the day persuasion fails — denied commands + hooks.<\u002Fdiv><\u002Fdiv>\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:23px; color:rgba(244,238,225,0.8);\">settings.json · hooks/<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Contents\" data-screen-label=\"Contents\" data-speaker-notes=\"Everything but README, AUDIT and others/ is meant to be copied straight into your repo. Walk the tree quickly — constitution, references, rules, skills, agents, and the new enforced layer: settings.json plus hooks. And the key line: no application code, only documentation and config.\" style=\"box-sizing:border-box; background:#F4EEE1; color:#171310; padding:92px 120px; font-family:'Spline Sans',sans-serif; display:flex; flex-direction:column;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; font-family:'JetBrains Mono',monospace; font-size:22px; letter-spacing:0.14em; text-transform:uppercase; color:#8A8171; border-bottom:1px solid rgba(23,19,16,0.14); padding-bottom:22px;\">\n      <span>What's inside<\u002Fspan><span>05 / 08<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1; display:grid; grid-template-columns:1.35fr 1fr; gap:96px; align-items:center;\">\n      <div>\n        <h2 class=\"rise\" style=\"margin:0 0 34px; font-family:'Libre Caslon Display',serif; font-weight:400; font-size:76px; line-height:1.0;\">What's inside the kit.<\u002Fh2>\n        <pre class=\"rise\" style=\"animation-delay:0.12s; margin:0; font-family:'JetBrains Mono',monospace; font-size:24px; line-height:1.8; color:#2C2820;\">claude-harness-kit/\n├── <span style=\"color:#171310; font-weight:600;\">CLAUDE.md<\u002Fspan>              <span style=\"color:#A69B87;\">constitution template<\u002Fspan>\n├── <span style=\"color:#171310; font-weight:600;\">AGENTS.md<\u002Fspan>              <span style=\"color:#A69B87;\">agent-layer index<\u002Fspan>\n├── <span style=\"color:#171310; font-weight:600;\">docs/ai/<\u002Fspan>               <span style=\"color:#A69B87;\">12 reference docs · 00–11<\u002Fspan>\n├── <span style=\"color:#171310; font-weight:600;\">.claude/rules/<\u002Fspan>         <span style=\"color:#A69B87;\">4 enforceable rule sets<\u002Fspan>\n├── <span style=\"color:#171310; font-weight:600;\">.claude/skills/<\u002Fspan>        <span style=\"color:#A69B87;\">7 repeatable skills<\u002Fspan>\n├── <span style=\"color:#171310; font-weight:600;\">.claude/agents/<\u002Fspan>        <span style=\"color:#A69B87;\">3 verification subagents<\u002Fspan>\n├── <span style=\"color:#171310; font-weight:600;\">.claude/settings.json<\u002Fspan>  <span style=\"color:#A69B87;\">denied commands + hooks<\u002Fspan>\n├── <span style=\"color:#171310; font-weight:600;\">.claude/hooks/<\u002Fspan>         <span style=\"color:#A69B87;\">3 mechanical guards<\u002Fspan>\n└── <span style=\"color:#171310; font-weight:600;\">templates/<\u002Fspan>             <span style=\"color:#A69B87;\">CI · PR<\u002Fspan><\u002Fpre>\n      <\u002Fdiv>\n      <div class=\"rise\" style=\"animation-delay:0.24s; border-left:4px solid #E4572E; padding-left:44px;\">\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:22px; letter-spacing:0.12em; text-transform:uppercase; color:#E4572E; margin-bottom:22px;\">New in v1.1<\u002Fdiv>\n        <p style=\"margin:0 0 34px; font-family:'Libre Caslon Display',serif; font-size:44px; line-height:1.2; color:#171310;\">Rules you <em>ask<\u002Fem> for and rules the system <em>enforces<\u002Fem> are different layers — the kit now ships both.<\u002Fp>\n        <p style=\"margin:0; font-size:29px; line-height:1.45; color:#4C463C; font-weight:300;\">No application code. Copy everything except <span style=\"font-family:'JetBrains Mono',monospace; font-size:25px;\">README.md<\u002Fspan>, <span style=\"font-family:'JetBrains Mono',monospace; font-size:25px;\">AUDIT.md<\u002Fspan> and <span style=\"font-family:'JetBrains Mono',monospace; font-size:25px;\">others/<\u002Fspan> — those document the kit itself.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Quick Start\" data-screen-label=\"Quick Start\" data-speaker-notes=\"Adoption is a copy-paste and six short follow-ups. Copy docs and .claude into your project root, keep the hooks executable, drop in the CI workflow, then fill placeholders, review the deny list, and make the six day-one decisions.\" style=\"box-sizing:border-box; background:#F4EEE1; color:#171310; padding:92px 120px; font-family:'Spline Sans',sans-serif; display:flex; flex-direction:column;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; font-family:'JetBrains Mono',monospace; font-size:22px; letter-spacing:0.14em; text-transform:uppercase; color:#8A8171; border-bottom:1px solid rgba(23,19,16,0.14); padding-bottom:22px;\">\n      <span>Quick start<\u002Fspan><span>06 / 08<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1; display:flex; flex-direction:column; justify-content:center;\">\n      <h2 class=\"rise\" style=\"margin:0 0 44px; font-family:'Libre Caslon Display',serif; font-weight:400; font-size:80px; line-height:1.0;\">Adopt it in five minutes.<\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:1.05fr 1fr; gap:72px; align-items:stretch;\">\n        <div class=\"rise\" style=\"animation-delay:0.12s; background:#151009; border-radius:14px; padding:44px 48px; font-family:'JetBrains Mono',monospace; font-size:25px; line-height:1.95; color:#E7E0D2;\">\n          <div style=\"color:#8A8171;\"># from your project root<\u002Fdiv>\n          <div><span style=\"color:#E4572E;\">cp -r<\u002Fspan> &lt;kit&gt;/docs &lt;kit&gt;/.claude ./<\u002Fdiv>\n          <div><span style=\"color:#E4572E;\">chmod +x<\u002Fspan> .claude/hooks/*.sh<\u002Fdiv>\n          <div><span style=\"color:#E4572E;\">cp<\u002Fspan> &lt;kit&gt;/CLAUDE.md &lt;kit&gt;/AGENTS.md ./<\u002Fdiv>\n          <div><span style=\"color:#E4572E;\">cp<\u002Fspan> &lt;kit&gt;/templates/ci.yml \\<\u002Fdiv>\n          <div style=\"padding-left:2.4em;\">.github/workflows/ci.yml<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rise\" style=\"animation-delay:0.22s; display:flex; flex-direction:column; gap:18px;\">\n          <div style=\"display:grid; grid-template-columns:52px 1fr; gap:22px; align-items:baseline;\"><span style=\"font-family:'Libre Caslon Display',serif; font-size:38px; color:#E4572E;\">1<\u002Fspan><span style=\"font-size:28px; line-height:1.34; color:#2C2820;\">Fill <strong style=\"font-weight:600;\">CLAUDE.md<\u002Fstrong> — name, personality, commands, paths.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:52px 1fr; gap:22px; align-items:baseline;\"><span style=\"font-family:'Libre Caslon Display',serif; font-size:38px; color:#E4572E;\">2<\u002Fspan><span style=\"font-size:28px; line-height:1.34; color:#2C2820;\">Review the deny list + hooks in <strong style=\"font-weight:600;\">settings.json<\u002Fstrong>.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:52px 1fr; gap:22px; align-items:baseline;\"><span style=\"font-family:'Libre Caslon Display',serif; font-size:38px; color:#E4572E;\">3<\u002Fspan><span style=\"font-size:28px; line-height:1.34; color:#2C2820;\">Set the CI working directory for your repo layout.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:52px 1fr; gap:22px; align-items:baseline;\"><span style=\"font-family:'Libre Caslon Display',serif; font-size:38px; color:#E4572E;\">4<\u002Fspan><span style=\"font-size:28px; line-height:1.34; color:#2C2820;\">Read <strong style=\"font-weight:600;\">00_harness_overview.md<\u002Fstrong> — how six layers load.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:52px 1fr; gap:22px; align-items:baseline;\"><span style=\"font-family:'Libre Caslon Display',serif; font-size:38px; color:#E4572E;\">5<\u002Fspan><span style=\"font-size:28px; line-height:1.34; color:#2C2820;\">Resolve the six <strong style=\"font-weight:600;\">needs-confirmation<\u002Fstrong> decisions.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:52px 1fr; gap:22px; align-items:baseline;\"><span style=\"font-family:'Libre Caslon Display',serif; font-size:38px; color:#E4572E;\">6<\u002Fspan><span style=\"font-size:28px; line-height:1.34; color:#2C2820;\">Delete the project-specific worked examples.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Taxonomy\" data-screen-label=\"Taxonomy\" data-speaker-notes=\"Every claim in the kit is tagged so you know how much to trust it and whether to port it. FACT vs REC for evidence; A/B/C/D for portability. This is what keeps it honest.\" style=\"box-sizing:border-box; background:#F4EEE1; color:#171310; padding:92px 120px; font-family:'Spline Sans',sans-serif; display:flex; flex-direction:column;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; font-family:'JetBrains Mono',monospace; font-size:22px; letter-spacing:0.14em; text-transform:uppercase; color:#8A8171; border-bottom:1px solid rgba(23,19,16,0.14); padding-bottom:22px;\">\n      <span>Provenance markers<\u002Fspan><span>07 / 08<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1; display:flex; flex-direction:column; justify-content:center;\">\n      <h2 class=\"rise\" style=\"margin:0 0 46px; font-family:'Libre Caslon Display',serif; font-weight:400; font-size:80px; line-height:1.0;\">Every claim is <span style=\"color:#E4572E;\">marked.<\u002Fspan><\u002Fh2>\n      <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:64px;\">\n        <div class=\"rise\" style=\"animation-delay:0.1s;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:22px; letter-spacing:0.12em; text-transform:uppercase; color:#8A8171; margin-bottom:26px;\">Evidence<\u002Fdiv>\n          <div style=\"display:flex; gap:20px; align-items:baseline; margin-bottom:22px;\"><span style=\"font-family:'JetBrains Mono',monospace; font-weight:600; font-size:30px; color:#E4572E; white-space:nowrap;\">[FACT]<\u002Fspan><span style=\"font-size:30px; line-height:1.34; color:#2C2820;\">Observed directly in the source codebase.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex; gap:20px; align-items:baseline;\"><span style=\"font-family:'JetBrains Mono',monospace; font-weight:600; font-size:30px; color:#E4572E; white-space:nowrap;\">[REC]<\u002Fspan><span style=\"font-size:30px; line-height:1.34; color:#2C2820;\">A recommendation derived from an observed outcome.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rise\" style=\"animation-delay:0.2s;\">\n          <div style=\"font-family:'JetBrains Mono',monospace; font-size:22px; letter-spacing:0.12em; text-transform:uppercase; color:#8A8171; margin-bottom:26px;\">Portability<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:auto 1fr; gap:14px 20px; font-size:29px; line-height:1.3; color:#2C2820;\">\n            <span style=\"font-family:'JetBrains Mono',monospace; font-weight:600; color:#E4572E;\">[A]<\u002Fspan><span>Universal.<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-weight:600; color:#E4572E;\">[B]<\u002Fspan><span>Generalize, then use.<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-weight:600; color:#E4572E;\">[C]<\u002Fspan><span>Do not port — a worked example.<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-weight:600; color:#E4572E;\">[D]<\u002Fspan><span>Needs a per-project decision.<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"rise\" style=\"animation-delay:0.3s; margin:56px 0 0; padding-top:34px; border-top:1px solid rgba(23,19,16,0.14); max-width:1400px; font-family:'Libre Caslon Display',serif; font-size:42px; line-height:1.24; color:#171310;\">Provenance is documented end-to-end in <span style=\"font-family:'JetBrains Mono',monospace; font-size:32px; color:#E4572E;\">AUDIT.md<\u002Fspan> — nothing is asserted without a receipt.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section data-label=\"Closing\" data-screen-label=\"Closing\" data-speaker-notes=\"Close on the promise. Ship with guardrails: every promise gets a test or a label. Point them to the repo and note a doc-friendly license fits.\" style=\"box-sizing:border-box; background:#E4572E; color:#1A0E06; padding:92px 120px; font-family:'Spline Sans',sans-serif; display:flex; flex-direction:column;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; font-family:'JetBrains Mono',monospace; font-size:22px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(26,14,6,0.62); border-bottom:1px solid rgba(26,14,6,0.24); padding-bottom:22px;\">\n      <span>The Claude Harness Kit<\u002Fspan><span>08 / 08<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1; display:flex; flex-direction:column; justify-content:center;\">\n      <h2 class=\"rise\" style=\"margin:0; font-family:'Libre Caslon Display',serif; font-weight:400; font-size:172px; line-height:0.92; letter-spacing:-0.01em;\">Ship with<br>guardrails.<\u002Fh2>\n      <div class=\"wipe\" style=\"animation-delay:0.4s; height:6px; width:340px; background:#1A0E06; margin:44px 0 42px;\"><\u002Fdiv>\n      <p class=\"rise\" style=\"animation-delay:0.16s; margin:0; max-width:1200px; font-size:42px; line-height:1.36; color:#3A1E0E; font-weight:400;\">Every promise gets a test — or an explicit label. Strong areas are the promises you guarded on purpose.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"fade\" style=\"animation-delay:0.4s; display:flex; justify-content:space-between; align-items:flex-end; font-family:'JetBrains Mono',monospace; font-size:24px; color:#1A0E06;\">\n      <span>github.com/kumeS/RUST-Tauri-claude-harness-kit<\u002Fspan>\n      <span style=\"color:rgba(26,14,6,0.72);\">MIT / CC-BY-4.0 friendly · v1.2.0<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
